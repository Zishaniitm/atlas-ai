name: Nightly Build
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
jobs:
  nightly-smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with: { ref: develop }
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e ".[dev]" && pytest tests/unit/ -x -q
