# ATLAS defaults.yaml — SRS Appendix 14.2 (BUG-04: auth section present)
# Never store secrets here — API keys go in OS keychain only (NFR-015).
atlas:

  llm:
    provider: openai          # openai | anthropic | ollama
    model: gpt-4o
    temperature: 0.7
    max_tokens: 2048
    max_iterations: 10        # FR-115

  voice:
    stt_engine: whisper
    whisper_model: base       # tiny | base | small | medium | large-v3
    tts_engine: kokoro        # BUG-02: NOT coqui
    persona: atlas_default
    speaking_rate: 1.0        # FR-016: 0.5–2.0
    pitch_offset: 0           # FR-016: -12 to +12 semitones
    wake_word: "hey atlas"
    mic_device_index: null

  memory:
    working_window: 20
    vector_db_path: "~/.atlas/memory/chroma"
    sqlite_path: "~/.atlas/data/atlas.db"
    async_writes: true        # BUG-09: ALWAYS true

  auth:                       # BUG-04: was missing in v1 — now always present
    primary_method: pin       # pin | voice_print | face | hello | fido2
    fallback_method: pin
    two_factor_enabled: false
    voice_print_threshold: 0.92
    face_distance_threshold: 0.45
    rate_limit_attempts: 5
    rate_limit_lockout_sec: 30
    full_lockout_after: 10
    tier2_risk_levels:
      - critical
      - high
    tier3_enabled: false
    tier3_check_interval_sec: 30
    biometric_data_path: "~/.atlas/security"

  api:
    host: "127.0.0.1"
    port: 7770

  ui:
    theme: dark
    hud_opacity: 0.95
    always_on_top: false
    font_scale: 1.0
    language: en_US

  skills:
    enabled:
      - file_manager
      - app_launcher
      - web_search
      - web_browsing
      - code_executor
      - system_monitor
      - calculator
      - wikipedia
      - weather
      - datetime
      - clipboard
      - screenshot_ocr
      - volume_control
    confirm_destructive: true

  notifications:
    desktop_toasts: true
    proactive_reminders: true
    reminder_lead_time_min: 15

  telemetry:
    crash_reports_local: true
    sentry_enabled: false
    log_retention_days: 30
    log_dir: "~/.atlas/logs"

  updates:
    auto_check: true
    update_channel: stable
    github_repo: "atlas-ai/atlas-ai"  # BUG-03: update-checker target
